<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Placement Prediction</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f1a;
    --surface:   #151827;
    --border:    rgba(255,255,255,0.08);
    --accent:    #6C63FF;
    --accent2:   #FF6584;
    --green:     #22d3a5;
    --amber:     #fbbf24;
    --red:       #f87171;
    --text:      #e8eaf0;
    --muted:     #7b7f94;
    --radius:    14px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 60px;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }
  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    background: linear-gradient(135deg, #6C63FF 0%, #FF6584 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 8px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    width: 100%;
    max-width: 580px;
  }

  /* ── INPUT ROW ── */
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }
  .input-row input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color .2s;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: var(--muted); }

  /* ── BUTTONS ── */
  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 16px;
    border: none;
    border-radius: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: transform .15s, opacity .2s;
  }
  .btn:hover { transform: translateY(-2px); opacity: .9; }
  .btn:active { transform: translateY(0); }

  .btn-show   { background: var(--accent);  color: #fff; grid-column: 1 / -1; font-size: 0.95rem; padding: 13px; }
  .btn-all    { background: #2563eb; color: #fff; }
  .btn-high   { background: var(--green);   color: #0d1f18; }
  .btn-medium { background: var(--amber);   color: #1c1200; }
  .btn-low    { background: var(--red);     color: #1c0000; }

  /* ── RESULT PANEL ── */
  #result-panel {
    margin-top: 28px;
    display: none;
  }
  .result-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }
  .result-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .result-id   { color: var(--muted); font-size: 0.8rem; margin-bottom: 16px; }
  .result-row  { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
  .result-row:last-child { border-bottom: none; }
  .result-label { color: var(--muted); }

  .badge {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    font-family: 'Space Grotesk', sans-serif;
  }
  .badge-high   { background: rgba(34,211,165,0.15); color: var(--green); }
  .badge-medium { background: rgba(251,191,36,0.15);  color: var(--amber); }
  .badge-low    { background: rgba(248,113,113,0.15); color: var(--red);   }
  .badge-placed { background: rgba(108,99,255,0.2);   color: #a89cff;     }

  .error-msg { color: var(--red); font-size: 0.88rem; margin-top: 12px; text-align: center; }

  /* ── CANVAS OVERLAY ── */
  #celebration-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9999;
    display: none;
  }

  /* ── EMOJI RAIN ── */
  .emoji-float {
    position: fixed;
    font-size: 2rem;
    pointer-events: none;
    z-index: 10000;
    animation: floatUp 2.4s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-220px) scale(1.3) rotate(25deg); }
  }
</style>
</head>
<body>

<canvas id="celebration-canvas"></canvas>

<div class="header">
  <h1>🎓 Student Placement Predictor</h1>
  <p>Enter a student ID to view placement analysis</p>
</div>

<div class="card">
  <!-- Input + Show Report -->
  <div class="input-row">
    <input type="text" id="student-id-input" placeholder="Enter Student ID (e.g. S001)"
           onkeydown="if(event.key==='Enter') showReport()">
    <button class="btn btn-show" onclick="showReport()">🔍 Show Report</button>
  </div>

  <!-- 4 filter buttons -->
  <div class="btn-grid">
    <a class="btn btn-all"    href="/report/all">📋 All 20 Students</a>
    <a class="btn btn-high"   href="/report/high">🟢 High Chances</a>
    <a class="btn btn-medium" href="/report/medium">🟡 Medium Chances</a>
    <a class="btn btn-low"    href="/report/low">🔴 Low Chances</a>
  </div>

  <!-- Result panel (filled via JS) -->
  <div id="result-panel">
    <div class="result-card" id="result-inner"></div>
  </div>
  <div class="error-msg" id="error-msg"></div>
</div>

<script>
/* ════════════════════════════════════════════
   FETCH STUDENT REPORT
════════════════════════════════════════════ */
async function showReport() {
  const sid = document.getElementById('student-id-input').value.trim();
  const panel = document.getElementById('result-panel');
  const inner = document.getElementById('result-inner');
  const errEl = document.getElementById('error-msg');

  errEl.textContent = '';
  panel.style.display = 'none';

  if (!sid) { errEl.textContent = 'Please enter a student ID.'; return; }

  try {
    const res  = await fetch('/report/student', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `student_id=${encodeURIComponent(sid)}`
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Student not found.'; return; }

    renderResult(data);
    panel.style.display = 'block';

    // ── CELEBRATION ──
    if (data.prediction.placed) {
      launchFireworks();
    } else {
      launchEncouragement();
    }

  } catch (e) {
    errEl.textContent = 'Server error. Make sure Flask is running.';
  }
}

/* ════════════════════════════════════════════
   RENDER RESULT CARD
════════════════════════════════════════════ */
function renderResult(d) {
  const p = d.prediction;
  const chanceBadge = `<span class="badge badge-${p.chance}">${p.label}</span>`;
  const placedBadge = p.placed
    ? `<span class="badge badge-placed">✅ Placed</span>`
    : `<span style="color:var(--muted);font-size:.85rem">Not yet placed</span>`;

  document.getElementById('result-inner').innerHTML = `
    <div class="result-name">${d.name || 'Student'}</div>
    <div class="result-id">ID: ${d.student_id}</div>
    ${row('CGPA', d.cgpa)}
    ${row('Internships', d.internships)}
    ${row('Projects', d.projects)}
    ${row('Skills', d.skills_count)}
    ${row('Prediction Score', p.score)}
    ${row('Placement Chance', chanceBadge)}
    ${row('Status', placedBadge)}
  `;
}
function row(label, val) {
  return `<div class="result-row"><span class="result-label">${label}</span><span>${val}</span></div>`;
}

/* ════════════════════════════════════════════
   🎆 FIREWORKS  – for PLACED students
════════════════════════════════════════════ */
function launchFireworks() {
  const canvas = document.getElementById('celebration-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.style.display = 'block';
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  const COLORS = ['#6C63FF','#FF6584','#22d3a5','#fbbf24','#a78bfa','#f472b6','#34d399','#60a5fa'];

  function Firework(x, y) {
    const count = 90 + Math.floor(Math.random() * 40);
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
      const speed = 3 + Math.random() * 5;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        alpha: 1,
        radius: 2 + Math.random() * 2.5,
        gravity: 0.12 + Math.random() * 0.08,
        drag: 0.97
      });
    }
  }

  // Launch 6 bursts spread across canvas
  const positions = [
    [canvas.width * 0.2, canvas.height * 0.3],
    [canvas.width * 0.8, canvas.height * 0.25],
    [canvas.width * 0.5, canvas.height * 0.2],
    [canvas.width * 0.15, canvas.height * 0.6],
    [canvas.width * 0.85, canvas.height * 0.55],
    [canvas.width * 0.5, canvas.height * 0.45],
  ];
  let burst = 0;
  const burstTimer = setInterval(() => {
    if (burst < positions.length) { Firework(...positions[burst]); burst++; }
    else clearInterval(burstTimer);
  }, 250);

  // Rain celebratory emojis
  const emojis = ['🎉','🎊','⭐','🏆','🥳','💯','🎓','✨'];
  for (let i = 0; i < 18; i++) {
    setTimeout(() => spawnEmoji(emojis[Math.floor(Math.random() * emojis.length)]), i * 120);
  }

  let frame;
  function animate() {
    ctx.fillStyle = 'rgba(13,15,26,0.18)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;  p.y += p.vy;
      p.vy += p.gravity;
      p.vx *= p.drag; p.vy *= p.drag;
      p.alpha -= 0.013;
      if (p.alpha <= 0) { particles.splice(i, 1); continue; }
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle   = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    if (particles.length > 0) {
      frame = requestAnimationFrame(animate);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.style.display = 'none';
    }
  }
  animate();

  // Auto-cleanup after 5s
  setTimeout(() => { cancelAnimationFrame(frame); ctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display='none'; }, 5000);
}

/* ════════════════════════════════════════════
   😊 ENCOURAGEMENT – for NOT YET placed
════════════════════════════════════════════ */
function launchEncouragement() {
  const emojis = ['😊','💪','🚀','📚','⭐','🌟','🎯','👍','🔥','✊'];
  for (let i = 0; i < 20; i++) {
    setTimeout(() => spawnEmoji(emojis[Math.floor(Math.random() * emojis.length)]), i * 100);
  }
  // Floating "Keep Going!" text
  spawnKeepGoing();
}

function spawnKeepGoing() {
  const msgs = ['Keep Going! 💪', 'You Got This! 🚀', 'Stay Strong! ⭐', 'Almost There! 🎯'];
  const msg  = msgs[Math.floor(Math.random() * msgs.length)];
  const el   = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = `
    position:fixed; left:50%; top:60%;
    transform:translateX(-50%) translateY(0);
    font-family:'Space Grotesk',sans-serif;
    font-size:1.8rem; font-weight:700;
    color:#fbbf24; text-shadow:0 0 20px rgba(251,191,36,0.6);
    pointer-events:none; z-index:10001;
    animation:floatUp 2.4s ease-out forwards;
  `;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

/* ════════════════════════════════════════════
   SHARED EMOJI SPAWN
════════════════════════════════════════════ */
function spawnEmoji(char) {
  const el   = document.createElement('div');
  el.className   = 'emoji-float';
  el.textContent = char;
  el.style.left  = Math.random() * 90 + 'vw';
  el.style.top   = (50 + Math.random() * 35) + 'vh';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}
</script>
</body>
</html>
